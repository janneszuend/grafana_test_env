resolver 127.0.0.11 valid=10s;

server {
    listen 3000;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Order endpoints → order-service
    location /api/orders {
        proxy_pass http://order-service:8080;
    }

    # Inventory reset via order-service proxy
    location = /api/inventory/reset {
        proxy_pass http://order-service:8080;
    }

    # Inventory stock lookups → inventory-service directly
    location /api/inventory/ {
        proxy_pass http://inventory-service:8081;
    }

    # Forward browser traces to Alloy OTLP HTTP endpoint (activate when Alloy is enabled)
    # Uses variable to avoid nginx crash when alloy is not running
    location /otlp/ {
        set $alloy_upstream http://alloy:4318;
        proxy_pass $alloy_upstream;
    }
}
