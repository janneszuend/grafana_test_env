resolver 127.0.0.11 valid=10s;

server {
    listen 3000;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Transaction and account endpoints → account-service (order-service container)
    location /api/transactions {
        proxy_pass http://order-service:8080;
    }

    location /api/accounts {
        proxy_pass http://order-service:8080;
    }

    # Balance checks → balance-service (inventory-service container)
    location /api/balance/ {
        proxy_pass http://inventory-service:8081;
    }

    # Forward browser traces to Alloy OTLP HTTP endpoint
    # Strip the /otlp/ prefix so /otlp/v1/traces → http://alloy:4318/v1/traces
    location /otlp/ {
        rewrite ^/otlp/(.*) /$1 break;
        set $alloy_upstream http://alloy:4318;
        proxy_pass $alloy_upstream;
    }
}
