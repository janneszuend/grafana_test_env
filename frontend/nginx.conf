server {
    listen 3000;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /api/transactions {
        proxy_pass http://account-service:8080;
    }

    location /api/accounts {
        proxy_pass http://account-service:8080;
    }

    location /api/balance/ {
        proxy_pass http://balance-service:8081;
    }

    # Forward browser traces to Alloy OTLP HTTP endpoint
    # Strip the /otlp/ prefix so /otlp/v1/traces → http://alloy:4318/v1/traces
    location /otlp/ {
        rewrite ^/otlp/(.*) /$1 break;
        proxy_pass http://alloy:4318;
    }
}
