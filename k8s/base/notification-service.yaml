apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: banking-poc/notification-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - { name: OTEL_SERVICE_NAME,                       value: notification-service }
            - { name: OTEL_RESOURCE_ATTRIBUTES,                value: service.namespace=banking-poc }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT,             value: http://alloy:4317 }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL,             value: grpc }
            - { name: OTEL_LOGS_EXPORTER,                      value: none }
            - { name: OTEL_METRICS_EXPORTER,                   value: otlp }
            - { name: OTEL_TRACES_EXPORTER,                    value: otlp }
            - { name: OTEL_INSTRUMENTATION_COMMON_EXCLUDED_URLS, value: "/actuator/*" }
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - { port: 8082, targetPort: 8082 }