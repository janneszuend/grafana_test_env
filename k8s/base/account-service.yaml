apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: banking-poc/account-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - { name: OTEL_SERVICE_NAME,                       value: account-service }
            - { name: OTEL_RESOURCE_ATTRIBUTES,                value: service.namespace=banking-poc }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT,             value: http://alloy:4317 }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL,             value: grpc }
            - { name: OTEL_LOGS_EXPORTER,                      value: none }
            - { name: OTEL_METRICS_EXPORTER,                   value: otlp }
            - { name: OTEL_TRACES_EXPORTER,                    value: otlp }
            - { name: OTEL_INSTRUMENTATION_COMMON_EXCLUDED_URLS, value: "/actuator/*" }
            - { name: BALANCE_SERVICE_URL,                     value: http://balance-service:8081 }
            - { name: NOTIFICATION_SERVICE_URL,                value: http://notification-service:8082 }
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
spec:
  selector:
    app: account-service
  ports:
    - { port: 8080, targetPort: 8080 }